<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clawdra - AI Coding Agent</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0a0a0a;
      --surface: #1a1a1a;
      --border: #2a2a2a;
      --text: #e0e0e0;
      --text-dim: #888;
      --cyan: #00d4ff;
      --green: #00ff88;
      --yellow: #ffcc00;
      --red: #ff4444;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .header {
      padding: 12px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .header h1 {
      color: var(--cyan);
      font-size: 18px;
    }
    .status {
      display: flex;
      gap: 12px;
      font-size: 12px;
      color: var(--text-dim);
    }
    .status .dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: 4px;
    }
    .status .dot.green { background: var(--green); }
    .status .dot.yellow { background: var(--yellow); animation: pulse 1s infinite; }
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .message {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 12px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    .message.user {
      background: #1a3a5a;
      border: 1px solid #2a5a8a;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }
    .message.assistant {
      background: var(--surface);
      border: 1px solid var(--border);
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }
    .message.system {
      background: transparent;
      border: none;
      color: var(--text-dim);
      font-size: 12px;
      align-self: center;
    }
    .message.tool {
      background: #2a2a1a;
      border: 1px solid #4a4a2a;
      color: var(--yellow);
      font-size: 12px;
      align-self: center;
    }
    .message.error {
      background: #3a1a1a;
      border: 1px solid #5a2a2a;
      color: var(--red);
      align-self: center;
    }
    .input-area {
      padding: 16px 20px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      gap: 12px;
    }
    .input-area input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 12px 16px;
      border-radius: 8px;
      font-family: inherit;
      font-size: 14px;
      outline: none;
    }
    .input-area input:focus {
      border-color: var(--cyan);
    }
    .input-area button {
      background: var(--cyan);
      color: #000;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      transition: background 0.2s;
    }
    .input-area button:hover {
      background: #00aadd;
    }
    .input-area button:disabled {
      background: #444;
      color: #888;
      cursor: not-allowed;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    .typing-indicator {
      display: none;
      color: var(--yellow);
      font-size: 12px;
      padding: 8px 16px;
    }
    .typing-indicator.active {
      display: block;
    }
    .commands {
      position: absolute;
      bottom: 80px;
      left: 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      font-size: 12px;
      display: none;
      max-height: 200px;
      overflow-y: auto;
    }
    .commands.active {
      display: block;
    }
    .commands div {
      padding: 4px 8px;
      cursor: pointer;
    }
    .commands div:hover {
      background: var(--bg);
    }
    .commands .cmd {
      color: var(--green);
      margin-right: 8px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🔥 CLAWDRA</h1>
    <div class="status">
      <span><span class="dot green" id="statusDot"></span><span id="statusText">Connected</span></span>
      <span id="modelInfo">-</span>
      <span id="msgCount">0 messages</span>
    </div>
  </div>

  <div class="chat-area" id="chatArea">
    <div class="message system">Welcome to Clawdra Web UI! Type /help for commands.</div>
  </div>

  <div class="typing-indicator" id="typingIndicator">🤔 Clawdra is thinking...</div>

  <div class="input-area">
    <input type="text" id="messageInput" placeholder="Type a message or /help..." autocomplete="off">
    <button id="sendBtn" onclick="sendMessage()">Send</button>
  </div>

  <script>
    let messageCount = 0;
    let isProcessing = false;
    let ws = null;

    // WebSocket connection
    function connect() {
      const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
      ws = new WebSocket(`${protocol}//${window.location.host}`);

      ws.onopen = () => {
        document.getElementById('statusDot').className = 'dot green';
        document.getElementById('statusText').textContent = 'Connected';
      };

      ws.onclose = () => {
        document.getElementById('statusDot').className = 'dot yellow';
        document.getElementById('statusText').textContent = 'Disconnected - Reconnecting...';
        setTimeout(connect, 3000);
      };

      ws.onmessage = (event) => {
        const data = JSON.parse(event.data);
        handleMessage(data);
      };
    }

    function handleMessage(data) {
      const chatArea = document.getElementById('chatArea');
      const typingIndicator = document.getElementById('typingIndicator');

      switch (data.type) {
        case 'content':
          // Streaming content update
          const existingMsg = document.getElementById(data.messageId);
          if (existingMsg) {
            existingMsg.textContent = data.content;
          }
          break;

        case 'tool_call':
          typingIndicator.classList.add('active');
          const toolMsg = document.createElement('div');
          toolMsg.className = 'message tool';
          toolMsg.textContent = `🛠️ Using: ${data.toolName}`;
          chatArea.appendChild(toolMsg);
          break;

        case 'done':
          typingIndicator.classList.remove('active');
          isProcessing = false;
          document.getElementById('sendBtn').disabled = false;
          document.getElementById('statusDot').className = 'dot green';
          document.getElementById('statusText').textContent = 'Connected';
          messageCount++;
          document.getElementById('msgCount').textContent = `${messageCount} messages`;
          chatArea.scrollTop = chatArea.scrollHeight;
          break;

        case 'error':
          typingIndicator.classList.remove('active');
          isProcessing = false;
          document.getElementById('sendBtn').disabled = false;
          const errMsg = document.createElement('div');
          errMsg.className = 'message error';
          errMsg.textContent = `❌ Error: ${data.error}`;
          chatArea.appendChild(errMsg);
          break;
      }

      chatArea.scrollTop = chatArea.scrollHeight;
    }

    async function sendMessage() {
      const input = document.getElementById('messageInput');
      const text = input.value.trim();
      if (!text || isProcessing) return;

      const chatArea = document.getElementById('chatArea');

      // Add user message
      const userMsg = document.createElement('div');
      userMsg.className = 'message user';
      userMsg.textContent = text;
      chatArea.appendChild(userMsg);

      // Add assistant placeholder
      const assistantId = `msg-${Date.now()}`;
      const assistantMsg = document.createElement('div');
      assistantMsg.id = assistantId;
      assistantMsg.className = 'message assistant';
      assistantMsg.textContent = '';
      chatArea.appendChild(assistantMsg);

      input.value = '';
      isProcessing = true;
      document.getElementById('sendBtn').disabled = true;
      document.getElementById('typingIndicator').classList.add('active');

      // Send via WebSocket or fetch
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({
          type: 'message',
          content: text,
          messageId: assistantId,
        }));
      } else {
        // Fallback to HTTP
        try {
          const response = await fetch('/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: text }),
          });
          const data = await response.json();
          assistantMsg.textContent = data.response;
          isProcessing = false;
          document.getElementById('sendBtn').disabled = false;
          document.getElementById('typingIndicator').classList.remove('active');
          messageCount++;
          document.getElementById('msgCount').textContent = `${messageCount} messages`;
        } catch (error) {
          assistantMsg.className = 'message error';
          assistantMsg.textContent = `❌ Error: ${error.message}`;
          isProcessing = false;
          document.getElementById('sendBtn').disabled = false;
          document.getElementById('typingIndicator').classList.remove('active');
        }
      }

      chatArea.scrollTop = chatArea.scrollHeight;
    }

    // Enter key to send
    document.getElementById('messageInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        sendMessage();
      }
    });

    // Slash command for help
    document.getElementById('messageInput').addEventListener('input', (e) => {
      const text = e.target.value;
      if (text === '/') {
        // Show commands hint
      }
    });

    // Connect on load
    connect();
  </script>
</body>
</html>
